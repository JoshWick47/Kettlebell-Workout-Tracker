<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instinct Flow Tracker</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-color: #c9d1d9;
            --text-dim: #8b949e;
            --accent-color: #ff9e2c;
            --success-color: #2ea44f;
            --timer-color: #58a6ff;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 15px;
            max-width: 500px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 15px;
        }
        h1 {
            font-size: 1.4rem;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .subtitle {
            font-size: 0.8rem;
            color: var(--accent-color);
            font-weight: 700;
            letter-spacing: 2px;
            margin-top: 2px;
        }
        .controls-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 6px;
            font-weight: 600;
            text-transform: uppercase;
        }
        select {
            width: 100%;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: #ffffff;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            outline: none;
        }
        .timer-banner {
            background-color: #1f242c;
            border: 1px solid var(--timer-color);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            margin-bottom: 15px;
            position: sticky;
            top: 10px;
            z-index: 10;
        }
        .timer-display {
            font-size: 2rem;
            font-family: monospace;
            font-weight: bold;
            color: var(--timer-color);
        }
        .progress-bar-container {
            background: var(--bg-color);
            border-radius: 4px;
            height: 5px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-bar {
            background: var(--timer-color);
            height: 100%;
            width: 0%;
            transition: width 1s linear;
        }
        .container-title {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .flow-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }
        .dual-set-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px;
        }
        .set-header {
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        .exercise-block {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 6px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .exercise-block:last-child {
            margin-bottom: 0;
        }
        .ex-name {
            font-weight: 600;
            font-size: 0.95rem;
        }
        .ex-reps {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 2px;
            display: block;
        }
        .checkbox-ui {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-color);
            border-radius: 5px;
        }
        .exercise-block.completed {
            border-color: var(--success-color);
            background-color: rgba(46, 164, 79, 0.03);
        }
        .exercise-block.completed .checkbox-ui {
            background-color: var(--success-color);
            border-color: var(--success-color);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .exercise-block.completed .checkbox-ui::after {
            content: "✓";
            color: #ffffff;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .exercise-block.completed .ex-name {
            text-decoration: line-through;
            color: var(--text-dim);
        }
        .reset-btn {
            width: 100%;
            background-color: transparent;
            border: 1px solid #f85149;
            color: #f85149;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Instinct Flow Tracker</h1>
        <div class="subtitle">30-Day Athletic Split</div>
    </header>

    <div class="controls-card">
        <label for="workoutSelect">Select Today's Routine</label>
        <select id="workoutSelect" onchange="changeWorkout()">
            <option value="A">Workout A: Upper Flow & Power Hinge</option>
            <option value="B">Workout B: Rotational & Lower Engine</option>
            <option value="C">Workout C: Full Body Warrior Complex</option>
        </select>
    </div>

    <div class="timer-banner">
        <div class="subtitle" id="timerLabel" style="color:var(--text-dim)">Rest Tracker Idle</div>
        <div class="timer-display" id="timerClock">01:00</div>
        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <div class="container-title" id="routineTitle">Dual Blocks (5 Rounds Each)</div>
    <div class="flow-container" id="workoutTarget"></div>

    <button class="reset-btn" onclick="resetCurrentLog()">Reset Session State</button>

    <script>
        let countdownInterval = null;
        const routines = {
            A: [
                { title: "Dual Set 1", ex1: "Clean & Press", desc1: "5 Reps Per Side", ex2: "Two-Arm Power Swings", desc2: "10 Explosive Reps" },
                { title: "Dual Set 2", ex1: "Kettlebell Rows", desc1: "10 Reps Per Side", ex2: "Max Push-ups", desc2: "Unbroken Form Max" }
            ],
            B: [
                { title: "Dual Set 1", ex1: "Snatch to Reverse Lunge", desc1: "5 Reps Per Side", ex2: "Goblet Squats", desc2: "8 Controlled Reps" },
                { title: "Dual Set 2", ex1: "KB Tactical Cleans", desc1: "10 Alternating Reps", ex2: "Hanging Leg Raises / V-Ups", desc2: "12 Strict Reps" }
            ],
            C: [
                { title: "Dual Set 1", ex1: "Kettlebell Armor Complex", desc1: "5 Reps (Clean+Squat+Press=1)", ex2: "Chest-to-Bar Pull-ups", desc2: "15 Smooth Reps" },
                { title: "Dual Set 2", ex1: "Hand-to-Hand Swings", desc1: "20 Dynamic Reps", ex2: "Hardstyle Plank Accent", desc2: "60 Second Static Hold" }
            ]
        };

        function buildDashboard() {
            const currentRoutine = document.getElementById('workoutSelect').value;
            const targetGrid = document.getElementById('workoutTarget');
            targetGrid.innerHTML = '';

            routines[currentRoutine].forEach((set, setIdx) => {
                for (let r = 1; r <= 5; r++) {
                    const card = document.createElement('div');
                    card.className = 'dual-set-card';
                    const id1 = `${currentRoutine}_s${setIdx}_r${r}_a`;
                    const id2 = `${currentRoutine}_s${setIdx}_r${r}_b`;

                    card.innerHTML = `
                        <div class="set-header">
                            <span>${set.title.toUpperCase()}</span>
                            <span>ROUND ${r} / 5</span>
                        </div>
                        <div class="exercise-block" id="${id1}" onclick="toggleMove('${id1}')">
                            <div><span class="ex-name">${set.ex1}</span><span class="ex-reps">${set.desc1}</span></div>
                            <div class="checkbox-ui"></div>
                        </div>
                        <div class="exercise-block" id="${id2}" onclick="toggleMove('${id2}')">
                            <div><span class="ex-name">${set.ex2}</span><span class="ex-reps">${set.desc2}</span></div>
                            <div class="checkbox-ui"></div>
                        </div>
                    `;
                    targetGrid.appendChild(card);
                }
            });
            loadSessionState();
        }

        function toggleMove(id) {
            const block = document.getElementById(id);
            const isCompleting = !block.classList.contains('completed');
            block.classList.toggle('completed');
            saveSessionState();

            if (isCompleting && id.endsWith('b')) {
                startRestTimer();
            }
        }

        function startRestTimer() {
            clearInterval(countdownInterval);
            let timeLeft = 60;
            const clock = document.getElementById('timerClock');
            const label = document.getElementById('timerLabel');
            const bar = document.getElementById('progressBar');

            label.innerText = "POST-SET RECOVERY";
            label.style.color = "var(--timer-color)";

            countdownInterval = setInterval(() => {
                timeLeft--;
                const secs = timeLeft.toString().padStart(2, "0");
                clock.innerText = `00:${secs}`;
                bar.style.width = `${(timeLeft / 60) * 100}%`;

                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    label.innerText = "NEXT FLOW READY";
                    label.style.color = "var(--success-color)";
                    clock.innerText = "00:00";
                    bar.style.width = "0%";
                }
            }, 1000);
        }

        function changeWorkout() {
            clearInterval(countdownInterval);
            document.getElementById('timerLabel').innerText = "Rest Tracker Idle";
            document.getElementById('timerClock').innerText = "01:00";
            document.getElementById('progressBar').style.width = "0%";
            localStorage.setItem('instinct_active_workout', document.getElementById('workoutSelect').value);
            buildDashboard();
        }

        function saveSessionState() {
            const completed = [];
            document.querySelectorAll('.exercise-block.completed').forEach(el => completed.push(el.id));
            localStorage.setItem('instinct_completed_blocks', JSON.stringify(completed));
        }

        function loadSessionState() {
            const completed = localStorage.getItem('instinct_completed_blocks');
            if (completed) {
                JSON.parse(completed).forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.classList.add('completed');
                });
            }
        }

        window.onload = function() {
            const savedWorkout = localStorage.getItem('instinct_active_workout');
            if (savedWorkout) document.getElementById('workoutSelect').value = savedWorkout;
            buildDashboard();
        }

        function resetCurrentLog() {
            if (confirm("Reset current routine tracking state?")) {
                clearInterval(countdownInterval);
                localStorage.removeItem('instinct_completed_blocks');
                document.querySelectorAll('.exercise-block').forEach(el => el.classList.remove('completed'));
                document.getElementById('timerLabel').innerText = "Rest Tracker Idle";
                document.getElementById('timerClock').innerText = "01:00";
                document.getElementById('progressBar').style.width = "0%";
            }
        }
    </script>
</body>
</html>
